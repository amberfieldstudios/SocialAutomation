name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.7.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: npx --yes pnpm@9.7.0 install

      - name: Typecheck
        run: npx --yes pnpm@9.7.0 -r run typecheck

      - name: Build
        run: npx --yes pnpm@9.7.0 -r run build

      - name: Test
        run: npx --yes pnpm@9.7.0 -r run test

      - name: Lint
        run: npx --yes pnpm@9.7.0 run lint

      - name: Format check
        run: npx --yes pnpm@9.7.0 run format --check
        continue-on-error: true
